<div class="dashboard-container">

  <!-- ☰ Mobile Menu Button -->
  <button
  class="menu-toggle"
  *ngIf="!sidebarOpen"
  (click)="toggleSidebar()"
>
  ☰
</button>


  <!-- Overlay -->
  <div class="overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen">
    <button class="close-btn" (click)="closeSidebar()">✕</button>
<div class="logo-container">
  <img src="assets/images/smallLogo.png" class="logo" alt="Logo" />
    <p class="admin-title">Admin Control</p>
    <hr>
</div>


   <ul class="menu">

  <li>
    <a routerLink="Overview" routerLinkActive="active" (click)="closeSidebar()">
<i class="fa-regular fa-house"></i>      <span>Overview</span>
    </a>
  </li>

  <li>
    <a routerLink="Events" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-regular fa-calendar"></i>
      <span>Events</span>
    </a>
  </li>

  <li>
    <a routerLink="Ticketing" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-solid fa-ticket"></i>
      <span>Ticketing</span>
    </a>
  </li>

  <li>
    <a routerLink="Projects" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-regular fa-folder"></i>
      <span>Projects</span>
    </a>
  </li>

  <li>
    <a routerLink="Vendors" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-solid fa-users"></i>
      <span>Vendors</span>
    </a>
  </li>

  <li>
    <a routerLink="Space" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-solid fa-building"></i>
      <span>Space</span>
    </a>
  </li>

  <li>
    <a routerLink="Artists" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-solid fa-user-check"></i>
      <span>Artists</span>
    </a>
  </li>

  <li>
    <a routerLink="Producers" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-solid fa-building-columns"></i>
      <span>Producers</span>
    </a>
  </li>

  <li>
    <a routerLink="Agreements" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-regular fa-file-lines"></i>
      <span>Agreements</span>
    </a>
  </li>

  <li>
    <a routerLink="Payments" routerLinkActive="active" (click)="closeSidebar()">
     <i class="fa-solid fa-building-columns"></i>
      <span>Payments</span>
    </a>
  </li>

  <li>
    <a routerLink="Verification" routerLinkActive="active" (click)="closeSidebar()">
      <i class="fa-solid fa-circle-dollar-to-slot"></i>
      <span>Verification</span>
    </a>
  </li>

  <li>
    <a routerLink="Disputes" routerLinkActive="active" (click)="closeSidebar()">
<i class="fa-solid fa-gavel"></i>
      <span>Disputes</span>
    </a>
  </li>

</ul>
  </aside>

  <!-- Content -->
  <main class="content">

    <router-outlet></router-outlet>
  </main>

</div>
